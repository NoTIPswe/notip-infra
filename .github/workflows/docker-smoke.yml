name: docker-smoke

on:
  workflow_dispatch:
  push:
    branches: ["**"]
    paths:
      - "infra/**"
      - "containers/**"
      - ".github/workflows/docker-smoke.yml"
  pull_request:
    paths:
      - "infra/**"
      - "containers/**"
      - ".github/workflows/docker-smoke.yml"

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker daemon info
        run: docker info

      - name: Docker Compose version
        run: docker compose version

      - name: Build infra dev image
        run: docker build --target dev -f containers/infra/Dockerfile containers/infra

      - name: Build infra prod image
        run: docker build --target prod -f containers/infra/Dockerfile .

      - name: Docker runtime smoke test
        run: docker run --rm hello-world
