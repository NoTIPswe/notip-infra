name: lint

on:
  push:
    branches: ["**"]
    paths:
      - "infra/**"
      - "api-contracts/**"
      - "containers/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "infra/**"
      - "api-contracts/**"
      - "containers/**"
      - ".pre-commit-config.yaml"
      - ".github/workflows/lint.yml"

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1
