# Included at the http{} level by nginx.conf (via conf.d/*.conf glob).
# Do NOT include this file again inside a server{} block — it would duplicate headers.

add_header X-Content-Type-Options  "nosniff" always;

# add_header X-Frame-Options         "DENY" always;
add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

# frame-src 'none' is safe: keycloak-angular uses refresh token rotation
# (useRefreshToken: true), not the deprecated iframe-based check-sso.
# CSP disabled in Nginx because Keycloak manages its own security policy.
# add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:; frame-src 'none';" always;

# Uncomment when HTTPS is enabled:
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
