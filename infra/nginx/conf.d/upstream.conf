upstream mgmt_api {
    server management-api:3000;
}

upstream data_api {
    server data-api:3000;
}

upstream provisioning {
    server provisioning-service:3000;
}

upstream keycloak {
    server keycloak:8080;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # Security headers are applied at the http{} level via the conf.d glob in
    # nginx.conf. Do NOT re-include security-headers.conf here.

    # ── Internal-only routes ─────────────────────────────────────────────────
    # Internal HTTP/NATS bridging endpoints must never be reachable externally.
    location /internal/ {
        return 404;
    }

    # ── Keycloak ──────────────────────────────────────────────────────────────
    # No trailing slash: passes the full /auth/... path to Keycloak.
    # Requires KC_HTTP_RELATIVE_PATH=/auth on the Keycloak container.
    location /auth/ {
        proxy_pass         http://keycloak;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   X-Forwarded-Port  $server_port;
        # Keycloak sends large HTTP headers (OIDC discovery, JWKS)
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }

    # ── Management API ────────────────────────────────────────────────────────
    # Strips /api/mgmt/ prefix: service receives /gateways, /tenants, etc.
    location /api/mgmt/ {
        proxy_pass         http://mgmt_api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Re-include security headers: add_header in a location block replaces
        # ALL inherited headers from parent scopes — they must be re-declared.
        include /etc/nginx/conf.d/security-headers.conf;
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Data API — SSE streams ────────────────────────────────────────────────
    # Must come before the generic /api/data/ block (regex beats prefix).
    # Capture group strips /api/data/, service receives /{tenantId}/stream.
    # $is_args$args preserves the query string (e.g. ?since=<timestamp>).
    location ~ ^/api/data/([^/]+/stream.*)$ {
        proxy_pass         http://data_api/$1$is_args$args;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Required for SSE — must all be present
        proxy_buffering           off;
        proxy_cache               off;
        proxy_set_header          Connection "";
        proxy_read_timeout        3600s;
        proxy_http_version        1.1;
        chunked_transfer_encoding on;

        include /etc/nginx/conf.d/security-headers.conf;
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    }

    # ── Data API — all other endpoints ────────────────────────────────────────
    # Strips /api/data/ prefix: service receives /{tenantId}/query, etc.
    location /api/data/ {
        proxy_pass         http://data_api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        include /etc/nginx/conf.d/security-headers.conf;
        add_header Access-Control-Allow-Origin  "$http_origin" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    # ── Provisioning Service ──────────────────────────────────────────────────
    # Strips /api/provision/ prefix: service receives /onboard, etc.
    location /api/provision/ {
        proxy_pass         http://provisioning/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Frontend (Angular SPA) ────────────────────────────────────────────────
    # SPA routing (try_files fallback to index.html) is handled inside the
    # frontend container's own nginx config — not here. Proxying through
    # cleanly avoids masking legitimate upstream errors.
    location / {
        proxy_pass         http://frontend/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Simulator (:8090) is intentionally NOT proxied here.
    # Accessible only from the Simulation Dashboard on the Docker internal network.
}
