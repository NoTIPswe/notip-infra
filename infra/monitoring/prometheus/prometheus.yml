global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nats
    static_configs:
      - targets: ["nats-exporter:7777"]

  - job_name: management-api
    static_configs:
      - targets: ["management-api:3000"]
    metrics_path: /metrics

  - job_name: data-consumer
    static_configs:
      - targets: ["data-consumer:9090"]
    metrics_path: /metrics

  - job_name: simulator-backend
    static_configs:
      - targets: ["simulator:9090"]
    metrics_path: /metrics

  - job_name: data-api
    static_configs:
      - targets: ["data-api:3000"]
    metrics_path: /metrics

  - job_name: provisioning-service
    static_configs:
      - targets: ["provisioning-service:3000"]
    metrics_path: /metrics
