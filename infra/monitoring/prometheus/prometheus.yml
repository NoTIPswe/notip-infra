global:
  scrape_interval:     15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: nats
    static_configs:
      - targets: ["nats-exporter:7777"]

  - job_name: management-api
    static_configs:
      - targets: ["management-api:3001"]
    metrics_path: /metrics

  - job_name: data-api
    static_configs:
      - targets: ["data-api:3002"]
    metrics_path: /metrics

  - job_name: provisioning-svc
    static_configs:
      - targets: ["provisioning-svc:3004"]
    metrics_path: /metrics
