listen: "0.0.0.0:4222"

# HTTP monitoring — internal Docker network only, not exposed on host
http: "0.0.0.0:8222"

jetstream {
  store_dir: "/data"
  max_memory_store: 512MB
  max_file_store: 10GB
}

# mTLS: all clients must present a cert signed by the internal CA.
# verify_and_map: NATS extracts the cert subject as the username.
tls {
  ca_file:        "/certs/ca.crt"
  cert_file:      "/certs/nats.crt"
  key_file:       "/certs/nats.key"
  verify:         true
  verify_and_map: true
}

authorization {
  # For mTLS with verify_and_map, users must match the certificate DN string.
  # Note: NATS 2.10+ by default includes Organization if present in cert.
  users = [
    { user: "CN=management-api,O=notip", permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "CN=data-api,O=notip",       permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "CN=data-consumer,O=notip",  permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "CN=provisioning,O=notip",   permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "CN=simulator,O=notip",      permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
  ]

  default_permissions: {
    publish: {
      allow: ["telemetry.data.>", "command.ack.>"]
      deny:  ["internal.>", "alert.>", "gateway.>", "log.>"]
    }
    subscribe: {
      allow: ["command.gw.>"]
      deny:  ["internal.>", "telemetry.>", "alert.>", "log.>"]
    }
  }
}
