listen: "0.0.0.0:4222"

# HTTP monitoring — internal Docker network only, not exposed on host
http: "0.0.0.0:8222"

jetstream {
  store_dir: "/data"
  max_memory_store: 512MB
  max_file_store: 10GB
}

# mTLS: all clients must present a cert signed by the internal CA.
# verify_and_map: NATS extracts the cert CN as the username, then looks it up
# in authorization.users. Any CN not explicitly listed (gateway UUIDs) falls
# through to default_permissions.
tls {
  ca_file:        "/certs/ca.crt"
  cert_file:      "/certs/nats.crt"
  key_file:       "/certs/nats.key"
  verify:         true
  verify_and_map: true
}

authorization {
  # Applied to any cert whose CN is NOT listed in users[] below.
  # Covers all IoT gateways (CN = gateway UUID, issued at provisioning time).
  # Gateways: publish telemetry + ACKs only; subscribe to their commands only.
  # internal.* explicitly denied — gateways never see service-to-service traffic.
  default_permissions: {
    publish: {
      allow: ["telemetry.data.>", "command.ack.>"]
      deny:  ["internal.>", "alert.>", "gateway.>", "log.>"]
    }
    subscribe: {
      allow: ["command.gw.>"]
      deny:  ["internal.>", "telemetry.>", "alert.>", "log.>"]
    }
  }

  # Backend services: full access.
  # CN must exactly match the value used in scripts/provisioning-init.sh.
  users = [
    { user: "management-api", permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "data-api",       permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "data-consumer",  permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "provisioning",   permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
    { user: "simulator",      permissions: { publish: { allow: [">"] }, subscribe: { allow: [">"] } } }
  ]
}
