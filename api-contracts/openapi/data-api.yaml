openapi: "3.1.0"

info:
  title: NoTIP Data API
  version: "1.0.0"
  description: |
    Read-only telemetry access. All endpoints return **encrypted envelopes** — the Data API
    never decrypts payloads (Opaque Pipeline — Regola Zero). Decryption happens exclusively
    in the browser (Web Worker via WebCrypto) or in authorized API clients.

    The `tenant_id` path parameter is validated against the `tenant_id` JWT claim.
    All endpoints require a valid JWT (Bearer) from Keycloak realm `notip`.

servers:
  - url: http://localhost/api/data
    description: Local dev (via nginx)

security:
  - bearerAuth: []

tags:
  - name: Health
  - name: Query
  - name: Stream
  - name: Export
  - name: Sensors

paths:

  /health:
    get:
      tags: [Health]
      summary: Liveness/readiness probe
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  # ── Historical query ──────────────────────────────────────────────────────

  /data/{tenantId}/query:
    parameters:
      - $ref: "#/components/parameters/tenantId"
    get:
      tags: [Query]
      summary: Query encrypted telemetry envelopes
      description: |
        Returns encrypted envelopes stored in TimescaleDB. Filtering is on plaintext
        metadata only (gatewayId, sensorId, sensorType, time range) — the encryptedData
        field is opaque and cannot be queried by value.

        Pagination: cursor-based. Pass `nextCursor` from the previous response as `cursor`.
        Invalid sensorType returns an empty array (not 400).
      parameters:
        - name: gatewayId
          in: query
          schema:
            type: string
            format: uuid
        - name: sensorId
          in: query
          schema:
            type: string
            format: uuid
        - name: sensorType
          in: query
          schema:
            type: string
            enum: [temperature, humidity, movement, pressure, biometric]
        - name: from
          in: query
          required: true
          description: Start of time range (ISO 8601 UTC). Max window 24h.
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          description: End of time range (ISO 8601 UTC). Max window 24h.
          schema:
            type: string
            format: date-time
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 1000
            maximum: 1000
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResponse"
        "400":
          description: Invalid parameters (e.g. time range > 24h)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── SSE real-time stream ──────────────────────────────────────────────────

  /data/{tenantId}/stream:
    parameters:
      - $ref: "#/components/parameters/tenantId"
    get:
      tags: [Stream]
      summary: SSE stream of encrypted telemetry envelopes
      description: |
        Opens a Server-Sent Events connection. Encrypted envelopes are pushed as they arrive
        from the NATS TELEMETRY stream via in-memory fan-out (O(tenants)).

        If `since` is provided, historical records are replayed from TimescaleDB first,
        then the connection switches to real-time.

        Nginx is configured with `proxy_buffering off`, `proxy_cache off`,
        `proxy_read_timeout 3600s` for this endpoint.

        On JWT expiry: the server emits `{ "type": "error", "reason": "token_expired" }`
        and closes the connection. The client should refresh the token and reconnect.

        Auth: pass JWT as Bearer header (@microsoft/fetch-event-source on the client).
      parameters:
        - name: gatewayId
          in: query
          schema:
            type: string
            format: uuid
        - name: sensorId
          in: query
          schema:
            type: string
            format: uuid
        - name: sensorType
          in: query
          schema:
            type: string
            enum: [temperature, humidity, movement, pressure, biometric]
        - name: since
          in: query
          description: Replay from this timestamp. Defaults to live-only.
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: SSE stream
          content:
            text/event-stream:
              schema:
                type: string
                description: |
                  Each SSE event:
                    event: envelope
                    data: <JSON TelemetryEnvelope>

                  On token expiry:
                    event: error
                    data: {"type":"error","reason":"token_expired"}

                  Keepalive: `: keepalive` comment every 15s.
        "403":
          $ref: "#/components/responses/Forbidden"

  # ── Export ────────────────────────────────────────────────────────────────

  /data/{tenantId}/export:
    parameters:
      - $ref: "#/components/parameters/tenantId"
    get:
      tags: [Export]
      summary: Bulk export of encrypted envelopes
      description: |
        Returns all encrypted envelopes for the given time range (max 24h) as a JSON array.
        Not paginated — returns the entire window in one response.
        The frontend decrypts in the Web Worker and builds CSV/JSON for download.

        If the requested time window exceeds 24h, returns 400 with EXPORT_WINDOW_EXCEEDED.
      parameters:
        - name: gatewayId
          in: query
          schema:
            type: string
            format: uuid
        - name: sensorId
          in: query
          schema:
            type: string
            format: uuid
        - name: sensorType
          in: query
          schema:
            type: string
            enum: [temperature, humidity, movement, pressure, biometric]
        - name: from
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          required: true
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: OK — array of encrypted envelopes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TelemetryEnvelope"
        "400":
          description: Time window exceeds 24h
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ErrorResponse"
                  - type: object
                    properties:
                      maxHours:
                        type: integer
                        example: 24

  # ── Sensors ───────────────────────────────────────────────────────────────

  /data/{tenantId}/gateways/{gwId}/sensors:
    parameters:
      - $ref: "#/components/parameters/tenantId"
      - $ref: "#/components/parameters/gwId"
    get:
      tags: [Sensors]
      summary: List distinct sensors seen on a gateway
      description: |
        Returns DISTINCT (sensorId, sensorType) pairs seen in telemetry_data for this gateway.
        lastSeen = MAX(time) for each pair. Derived from TimescaleDB — no sensors table exists.
        Replaces the deprecated sensors[] field that was on the Management API gateway response.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorSummary"

  /data/{tenantId}/sensors:
    parameters:
      - $ref: "#/components/parameters/tenantId"
    get:
      tags: [Sensors]
      summary: List all distinct sensors for a tenant
      description: |
        All (sensorId, sensorType) pairs seen across all gateways for this tenant.
        Optionally filtered by gatewayId. Derived from TimescaleDB with DISTINCT ON.
      parameters:
        - name: gatewayId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SensorSummaryWithGateway"

# ────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ────────────────────────────────────────────────────────────────────────────

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    tenantId:
      name: tenantId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    gwId:
      name: gwId
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    Forbidden:
      description: Forbidden — tenant_id mismatch or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string

    TelemetryEnvelope:
      description: |
        Encrypted telemetry envelope as stored in TimescaleDB and returned to clients.
        Cloud components never inspect encryptedData/iv/authTag — they are opaque blobs.
        See contracts/crypto-contract.md for decryption instructions.
      type: object
      required: [gatewayId, sensorId, sensorType, timestamp, keyVersion, encryptedData, iv, authTag]
      properties:
        gatewayId:
          type: string
          format: uuid
        sensorId:
          type: string
          format: uuid
          description: Self-declared by firmware. Not registered in DB.
        sensorType:
          type: string
          enum: [temperature, humidity, movement, pressure, biometric]
        timestamp:
          type: string
          format: date-time
        keyVersion:
          type: integer
        encryptedData:
          type: string
          description: Base64-encoded AES-256-GCM ciphertext.
        iv:
          type: string
          description: Base64-encoded 12-byte nonce.
        authTag:
          type: string
          description: Base64-encoded 16-byte GCM authentication tag.

    QueryResponse:
      type: object
      required: [data, hasMore]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TelemetryEnvelope"
        nextCursor:
          type: string
          nullable: true
          description: Pass as `cursor` in the next request. Null when no more pages.
        hasMore:
          type: boolean

    SensorSummary:
      type: object
      required: [sensorId, sensorType, lastSeen]
      properties:
        sensorId:
          type: string
          format: uuid
        sensorType:
          type: string
          enum: [temperature, humidity, movement, pressure, biometric]
        lastSeen:
          type: string
          format: date-time

    SensorSummaryWithGateway:
      allOf:
        - $ref: "#/components/schemas/SensorSummary"
        - type: object
          required: [gatewayId]
          properties:
            gatewayId:
              type: string
              format: uuid
