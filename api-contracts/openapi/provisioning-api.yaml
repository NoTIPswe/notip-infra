openapi: "3.1.0"

info:
  title: NoTIP Provisioning Service API
  version: "1.0.0"
  description: |
    Handles gateway provisioning: validates factory credentials, signs the gateway CSR
    with the internal CA, generates the AES-256 key, and completes registration with the
    Management API via NATS Request-Reply.

    This is the only service-to-gateway channel that uses plain HTTPS — the gateway has
    no mTLS certificate yet at this point. All subsequent gateway communication uses mTLS
    on NATS port 4222.

    Internal NATS Request-Reply used during onboarding:
    - internal.mgmt.factory.validate  (validate factory_key, get gateway_id/tenant_id)
    - internal.mgmt.provisioning.complete  (persist AES key, mark gateway as provisioned)

servers:
  - url: http://localhost/api/provision
    description: Local dev (via nginx)

tags:
  - name: Health
  - name: Provisioning

paths:

  /health:
    get:
      tags: [Health]
      summary: Liveness/readiness probe
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /provision/onboard:
    post:
      tags: [Provisioning]
      summary: Provision a new gateway
      description: |
        Full provisioning flow in a single HTTPS call (gateway has no mTLS cert yet):

        1. Validate `factory_id` + `factory_key` via NATS RR `internal.mgmt.factory.validate`.
           Management API checks bcrypt(factory_key) against stored hash.
           Returns { gateway_id, tenant_id } or error.
        2. Sign the gateway's CSR with the internal CA (`/certs/ca.key` on the volume).
           Issued cert: Subject CN=<gateway_id>, SAN=<gateway_id>.<tenant_id>.gateways.notip.internal,
           KeyUsage=clientAuth, TTL=90 days.
        3. Generate a 256-bit AES key (crypto.randomBytes(32)).
        4. Persist key via NATS RR `internal.mgmt.provisioning.complete`.
           Management API: stores AES-256-GCM(key_material, DB_ENCRYPTION_KEY), sets provisioned=true,
           nulls factory_key_hash. Atomic transaction.
        5. Return signed certificate + AES key to the gateway over HTTPS.

        After this call the gateway connects to NATS :4222 using mTLS with its signed cert.

        Security controls on this endpoint:
        - factory_key stored as bcrypt (cost ≥ 12), verified and nulled after use (use-once)
        - provisioned=true after step 4 — duplicate attempts return 409 regardless of factory_key validity
        - Nginx rate limiting: 5 req/min per source IP
        - Every attempt (success or failure) is written to the audit log
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardRequest"
      responses:
        "200":
          description: Gateway provisioned successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardResponse"
        "400":
          description: Invalid CSR or malformed request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or already-used factory credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Gateway already provisioned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Management API unreachable via NATS (after 3 retries)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

# ────────────────────────────────────────────────────────────────────────────
# COMPONENTS
# ────────────────────────────────────────────────────────────────────────────

components:

  schemas:

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ok]

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string

    OnboardRequest:
      type: object
      required: [factory_id, factory_key, csr]
      properties:
        factory_id:
          type: string
          description: Gateway factory identifier (pre-registered by system_admin via Management API).
        factory_key:
          type: string
          description: |
            Pre-shared factory secret (≥32 random bytes). Single-use:
            nulled in DB after successful provisioning.
        csr:
          type: string
          description: |
            PEM-encoded PKCS#10 Certificate Signing Request.
            CN in the CSR must equal the gateway_id returned by factory validation.
            The gateway's private key never leaves the device.

    OnboardResponse:
      type: object
      required: [certificate, caCertificate, aesKey]
      properties:
        certificate:
          type: string
          description: |
            PEM-encoded signed gateway leaf certificate.
            CN=<gateway_id>, SAN=<gateway_id>.<tenant_id>.gateways.notip.internal
            KeyUsage=clientAuth. TTL=90 days (MVP).
            Use this cert for all subsequent NATS mTLS connections.
        caCertificate:
          type: string
          description: |
            PEM-encoded internal CA certificate.
            Gateway MUST pin this for NATS mTLS server verification.
        aesKey:
          type: string
          description: |
            Base64-encoded 256-bit AES key for encrypting telemetry.
            Transmitted once — store in gateway secure storage.
            See contracts/crypto-contract.md for the encryption envelope format.
            The platform does not re-transmit this key after provisioning.
